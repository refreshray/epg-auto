name: Auto Update 3BB EPG

on:
  schedule:
    # ตั้งเวลาให้รันทุกวันเวลา 18:00 น. ตามเวลาสากล UTC (เท่ากับ 01:00 น. หรือตี 1 เวลาไทย)
    - cron: '0 18 * * *'
  # ปุ่มกดสั่งให้รันเองแบบทันที (Manual)
  workflow_dispatch:

jobs:
  run-epg-script:
    runs-on: ubuntu-latest
    
    steps:
    # 1. ดึงโค้ดจากระบบมาทำงาน
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. ติดตั้งระบบ Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. ติดตั้ง Library เสริม (requests)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. สั่งรันสคริปต์ Python เพื่อดึงผังรายการ
    - name: Run EPG Script
      run: python epg_script.py

    # 5. สั่งให้เซฟไฟล์ผลลัพธ์ (3bb_epg.xml) กลับเข้าคลัง GitHub ของเรา
    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add 3bb_epg.xml
        git commit -m "อัปเดตผังรายการประจำวันอัตโนมัติ" || echo "ไม่มีการเปลี่ยนแปลง"
        git push
