name: Update My M3U Playlist

on:
  schedule:
    # รันอัตโนมัติทุกวัน เวลา 00:00 น. (เวลา UTC) หรือ 07:00 น. เวลาไทย
    - cron: '0 0 * * *'
  workflow_dispatch: # ปุ่มกดรันเองแบบ Manual ได้ตลอดเวลา

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write # อนุญาตให้บอท GitHub Actions เขียนไฟล์และ Push ลง Repo ได้

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run script
      run: python epg_script.py # 👈 มั่นใจว่าชื่อไฟล์ตรงกับโค้ด Python ของคุณ

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # ตรวจสอบว่าไฟล์ TV_epg.xml มีการอัปเดตหรือเปลี่ยนแปลงจริงไหม
        git add TV_epg.xml
        
        if [ -n "$(git status --porcelain)" ]; then
          echo "พบข้อมูล EPG อัปเดตใหม่ กำลังบันทึก..."
          git commit -m "Update EPG data [skip ci]"
          git push
        else
          echo "ข้อมูลเหมือนเดิม ไม่มีอะไรเปลี่ยนแปลง ไม่ต้อง Commit"
        fi
